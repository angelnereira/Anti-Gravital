name: Release

on:
  push:
    tags:
      - "v*"

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            binary: ag
            artifact: ag-linux-x86_64

          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            binary: ag
            artifact: ag-linux-aarch64

          - target: aarch64-apple-darwin
            runner: macos-latest
            binary: ag
            artifact: ag-darwin-aarch64

          - target: x86_64-apple-darwin
            runner: macos-latest
            binary: ag
            artifact: ag-darwin-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux musl targets)
        if: contains(matrix.target, 'linux')
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: contains(matrix.target, 'linux')
        run: cross build --release -p ag --target ${{ matrix.target }}

      - name: Build (native)
        if: "!contains(matrix.target, 'linux')"
        run: cargo build --release -p ag --target ${{ matrix.target }}

      - name: Rename artifact
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: true
