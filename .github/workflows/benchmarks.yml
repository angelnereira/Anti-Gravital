name: Benchmarks

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  rust-bench:
    name: Rust benchmarks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-bench-${{ hashFiles('**/Cargo.toml') }}

      - name: Run Rust benchmarks
        run: cargo bench --package ag-core 2>&1 | tee bench-rust.txt

      - name: Upload Rust benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: bench-rust-${{ github.sha }}
          path: bench-rust.txt

  go-bench:
    name: Go benchmarks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ag-runtime/go.mod

      - name: Run Go benchmarks
        working-directory: ag-runtime
        run: go test -bench=. -benchmem -count=3 ./... 2>&1 | tee ../bench-go.txt

      - name: Upload Go benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: bench-go-${{ github.sha }}
          path: bench-go.txt
